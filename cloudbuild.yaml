# Cloud Build pipeline para o Meu Divã
# Executa build e deploy no Google Cloud Run

steps:
  # ============================================
  # STEP 1: Build da imagem Docker
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/meudiva-api/meudiva-api-${_ENV}:${SHORT_SHA}'
      - '--build-arg'
      - 'ENVIRONMENT=${_ENV}'
      - '.'
    timeout: 600s

  # ============================================
  # STEP 2: Push da imagem para Artifact Registry
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/meudiva-api/meudiva-api-${_ENV}:${SHORT_SHA}'
    timeout: 300s

  # ============================================
  # STEP 3: Deploy no Cloud Run
  # ============================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meudiva-api-${_ENV}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/meudiva-api/meudiva-api-${_ENV}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '${_MEMORY}'
      - '--cpu'
      - '${_CPU}'
      - '--min-instances'
      - '${_MIN_INSTANCES}'
      - '--max-instances'
      - '${_MAX_INSTANCES}'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DB_URL}'
      - '--set-env-vars'
      - 'JWT_SECRET=${_JWT_SECRET}'
      - '--set-env-vars'
      - 'FRONTEND_URL=${_FRONTEND_URL}'
      - '--set-env-vars'
      - 'BACKEND_URL=${_BACKEND_URL}'
      - '--set-env-vars'
      - 'ENVIRONMENT=${_ENV}'
      - '--set-secrets'
      - 'STRIPE_SECRET_KEY=stripe-secret-key:latest'
      - '--set-secrets'
      - 'GOOGLE_CLIENT_ID=google-client-id:latest'
      - '--set-secrets'
      - 'GOOGLE_CLIENT_SECRET=google-client-secret:latest'
      - '--set-secrets'
      - 'MICROSOFT_CLIENT_ID=microsoft-client-id:latest'
      - '--set-secrets'
      - 'MICROSOFT_CLIENT_SECRET=microsoft-client-secret:latest'
      - '--set-secrets'
      - 'SMTP_HOST=smtp-host:latest'
      - '--set-secrets'
      - 'SMTP_USER=smtp-user:latest'
      - '--set-secrets'
      - 'SMTP_PASSWORD=smtp-password:latest'
      - '--set-secrets'
      - 'FROM_EMAIL=from-email:latest'
    timeout: 300s

  # ============================================
  # STEP 4: Testar o deploy
  # ============================================
  - name: 'gcr.io/cloud-builders/curl'
    id: 'test-deploy'
    args:
      - '--retry'
      - '5'
      - '--retry-delay'
      - '10'
      - '--fail'
      - '-s'
      - 'https://meudiva-api-${_ENV}-${_REGION}.a.run.app/health'
    timeout: 60s

# ============================================
# SUBSTITUIÇÕES (variáveis por ambiente)
# ============================================
substitutions:
  _REGION: southamerica-east1
  _MEMORY: 4Gi
  _CPU: '2'
  
  # Valores padrão (sobrescritos por ambiente)
  _ENV: non-prod
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '3'
  _DB_URL: ''
  _JWT_SECRET: ''
  _FRONTEND_URL: https://non-prod.meudivaonline.com
  _BACKEND_URL: https://api-non-prod.meudivaonline.com

# ============================================
# OPÇÕES DO BUILD
# ============================================
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: '100'

# ============================================
# TIMEOUT TOTAL DO BUILD
# ============================================
timeout: 1800s

# ============================================
# TAGS PARA IDENTIFICAÇÃO
# ============================================
tags:
  - 'meudiva'
  - 'cloud-run'
  - '${_ENV}'